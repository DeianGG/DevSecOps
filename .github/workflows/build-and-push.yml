name: Build & Push Hardened Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/hardening/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: devsecops
  DOCKERHUB_USER: deiangg

jobs:
  build:
    name: Build hardened WordPress image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=hardened
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger rescan workflow on hardened image
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scan.yml',
              ref: 'main',
              inputs: {
                wp_image: `ghcr.io/${context.repo.owner.toLowerCase()}/${{ env.IMAGE_NAME }}:hardened`,
                scan_label: 'after',
                wp_container_port: '8080'
              }
            });
