# Apache hardening - dropped into /etc/apache2/conf-enabled/
ServerTokens Prod
ServerSignature Off
TraceEnable Off
FileETag None

# Security response headers
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set X-XSS-Protection "1; mode=block"
    Header unset X-Powered-By
    Header always unset Server
</IfModule>

# Block XML-RPC entirely (DoS / brute-force vector)
<FilesMatch "^xmlrpc\.php$">
    Require all denied
</FilesMatch>

# Block direct access to wp-config.php (defence in depth)
<FilesMatch "^wp-config\.php$">
    Require all denied
</FilesMatch>

# Block access to .htaccess, .git, dotfiles
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# Block author enumeration via ?author=N (RewriteRule needs Directory scope)
<Directory /var/www/html>
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{QUERY_STRING} (^|&)author=\d [NC]
        RewriteRule .* - [F]
    </IfModule>
</Directory>

# Block access to readme files (version disclosure)
<FilesMatch "(readme|license|changelog)\.(html|txt|md)$">
    Require all denied
</FilesMatch>

# Disable PHP execution in uploads directory (LFI / web shell mitigation)
<Directory /var/www/html/wp-content/uploads>
    <FilesMatch "\.(?i:php|phtml|phar)$">
        Require all denied
    </FilesMatch>
</Directory>
